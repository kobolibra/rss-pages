name: Update RSS Feeds

on:
  workflow_dispatch:
  schedule:
    # Beijing time 07:25 = UTC 23:25 (previous day)
    - cron: "25 23 * * *"
    # Beijing time 17:15 = UTC 09:15
    - cron: "15 9 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml feedparser

      - name: Prepare dirs
        run: |
          mkdir -p site feeds/output

      - name: Mirror RSS feeds
        run: |
          python scripts/mirror_feeds.py
        env:
          OUT_DIR: site

      - name: Build WebToRSS feeds
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          export WEB_TO_RSS_PUBLIC_BASE="$BASE_URL"
          python web_to_rss.py -c feeds/blackrock_weekly_commentary.yaml -f -o blackrock_weekly_commentary.xml
          python web_to_rss.py -c feeds/carlyle_insights.yaml -f -o carlyle_insights.xml
          if ! python web_to_rss.py -c feeds/pitchbook_reports.yaml -f -o pitchbook_reports.xml; then
            echo "PitchBook build failed; restoring previously published copy"
            python scripts/restore_live_pages_feed.py "$BASE_URL" site "pitchbook_reports"
          fi
          python web_to_rss.py -c feeds/yardeni_morning_briefing.yaml -f -o yardeni_morning_briefing.xml

      - name: Copy generated XML to site
        run: |
          cp feeds/output/*.xml site/

      - name: Rewrite local item feeds for readers
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}"
          DOW=$(date -u +%u)
          HM=$(date -u +%H:%M)
          # 只在“北京时间周一 07:25 / 17:15”这两个窗口更新 blackrock/barclays
          # 对应 UTC：周日 23:25（DOW=7）和 周一 09:15（DOW=1）
          if [ "$DOW" = "7" ] && [ "$HM" = "23:25" ]; then
            UPDATE_SPECIAL=1
          elif [ "$DOW" = "1" ] && [ "$HM" = "09:15" ]; then
            UPDATE_SPECIAL=1
          else
            UPDATE_SPECIAL=0
          fi

          # Yardeni 继续每次都做本地化，blackrock/barclays 只在指定窗口重建
          python scripts/rewrite_local_item_feeds.py site "$BASE_URL" "yardeni_morning_briefing"
          if [ "$UPDATE_SPECIAL" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python scripts/rewrite_local_item_feeds.py site "$BASE_URL" "blackrock_weekly_commentary"
            python scripts/build_barclays_feed.py site "$BASE_URL"
          else
            python scripts/restore_live_pages_feed.py "$BASE_URL" site "blackrock_weekly_commentary,barclays_weekly_insights"
          fi

      - name: Add index page
        run: |
          cat > site/index.html <<'EOF'
          <html>
          <body>
            <h1>RSS Feeds</h1>
            <ul>
              <li><a href="pantheonmacro.xml">pantheonmacro</a></li>
              <li><a href="trivium_finance_regs.xml">Trivium Finance Regs</a></li>
              <li><a href="blackrock_weekly_commentary_diffbot.xml">BlackRock Weekly Commentary Diffbot</a></li>
              <li><a href="barclays_weekly_insights.xml">Barclays Weekly Insights</a></li>
              <li><a href="blackrock_weekly_commentary.xml">blackrock_weekly_commentary</a></li>
              <li><a href="carlyle_insights.xml">carlyle_insights</a></li>
              <li><a href="pitchbook_reports.xml">pitchbook_reports</a></li>
              <li><a href="yardeni_morning_briefing.xml">yardeni_morning_briefing</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
